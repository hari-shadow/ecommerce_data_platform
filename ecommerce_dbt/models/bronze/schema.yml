version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null

  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null

  - name: stg_order_payments
    columns:
      - name: order_id
        tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null

  - name: stg_sellers
    columns:
      - name: seller_id
        tests:
          - not_null

  - name: stg_exchange_rates
    columns:
      - name: rate_date
        tests:
          - not_null
      - name: rate
        tests:
          - not_null