version: 2

models:
  - name: orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable',
                       'invoiced', 'processing', 'created', 'approved']
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('customers')
              field: customer_id

  - name: customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: sellers
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: exchange_rates
    columns:
      - name: rate_date
        tests:
          - unique
          - not_null
      - name: rate
        tests:
          - not_null