ecommerce_dbt:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'ECOMMERCE_DBT_RUNNER') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'ECOMMERCE_BRONZE_DB') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'ECOMMERCE_BRONZE_WH') }}"
      schema: OLIST
      threads: 4